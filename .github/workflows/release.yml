name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

# Shared PyInstaller flags (platform-neutral subset)
env:
  PYI_COMMON: >-
    --onefile
    --paths src
    --collect-all customtkinter
    --collect-all tkinter
    --hidden-import tkinter
    --hidden-import _tkinter

jobs:
  # ── macOS arm64 (Apple Silicon) ────────────────────────────────────────────
  build-macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install Pillow customtkinter hachoir pyinstaller
      - name: Build
        run: |
          pyinstaller ${{ env.PYI_COMMON }} \
            --name "PhotoSort" \
            --add-data "src/photosort:photosort" \
            main.py
          mv dist/PhotoSort "dist/PhotoSort-macos-arm64"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: dist/PhotoSort-macos-arm64

  # ── macOS x64 (Intel) ──────────────────────────────────────────────────────
  build-macos-x64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install Pillow customtkinter hachoir pyinstaller
      - name: Build
        run: |
          pyinstaller ${{ env.PYI_COMMON }} \
            --name "PhotoSort" \
            --add-data "src/photosort:photosort" \
            main.py
          mv dist/PhotoSort "dist/PhotoSort-macos-x64"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-x64
          path: dist/PhotoSort-macos-x64

  # ── macOS Universal (fat binary: arm64 + x64 via lipo) ────────────────────
  build-macos-universal:
    needs: [build-macos-arm64, build-macos-x64]
    runs-on: macos-14
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: macos-arm64
          path: arm64/
      - uses: actions/download-artifact@v4
        with:
          name: macos-x64
          path: x64/
      - name: Combine with lipo
        run: |
          lipo -create \
            arm64/PhotoSort-macos-arm64 \
            x64/PhotoSort-macos-x64 \
            -output PhotoSort-macos-universal
          chmod +x PhotoSort-macos-universal
      - uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: PhotoSort-macos-universal

  # ── Windows x64 ────────────────────────────────────────────────────────────
  build-windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install Pillow customtkinter hachoir pyinstaller
      - name: Build
        run: |
          pyinstaller `
            --onefile `
            --paths src `
            --collect-all customtkinter `
            --collect-all tkinter `
            --hidden-import tkinter `
            --hidden-import _tkinter `
            --name PhotoSort `
            --add-data "src/photosort;photosort" `
            --noconsole `
            main.py
          mv dist\PhotoSort.exe dist\PhotoSort-windows-x64.exe
      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: dist\PhotoSort-windows-x64.exe

  # ── Windows arm64 ──────────────────────────────────────────────────────────
  build-windows-arm64:
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install Pillow customtkinter hachoir pyinstaller
      - name: Build
        run: |
          pyinstaller `
            --onefile `
            --paths src `
            --collect-all customtkinter `
            --collect-all tkinter `
            --hidden-import tkinter `
            --hidden-import _tkinter `
            --name PhotoSort `
            --add-data "src/photosort;photosort" `
            --noconsole `
            main.py
          mv dist\PhotoSort.exe dist\PhotoSort-windows-arm64.exe
      - uses: actions/upload-artifact@v4
        with:
          name: windows-arm64
          path: dist\PhotoSort-windows-arm64.exe

  # ── Windows Universal (zip of x64 + arm64) ────────────────────────────────
  build-windows-universal:
    needs: [build-windows-x64, build-windows-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-x64
          path: win/
      - uses: actions/download-artifact@v4
        with:
          name: windows-arm64
          path: win/
      - name: Package zip
        run: |
          cd win
          zip ../PhotoSort-windows-universal.zip \
            PhotoSort-windows-x64.exe \
            PhotoSort-windows-arm64.exe
      - uses: actions/upload-artifact@v4
        with:
          name: windows-universal
          path: PhotoSort-windows-universal.zip

  # ── GitHub Release ─────────────────────────────────────────────────────────
  release:
    needs:
      - build-macos-arm64
      - build-macos-x64
      - build-macos-universal
      - build-windows-x64
      - build-windows-arm64
      - build-windows-universal
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: macos-arm64
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: macos-x64
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: macos-universal
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: windows-x64
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: windows-arm64
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: windows-universal
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/PhotoSort-macos-arm64
            artifacts/PhotoSort-macos-x64
            artifacts/PhotoSort-macos-universal
            artifacts/PhotoSort-windows-x64.exe
            artifacts/PhotoSort-windows-arm64.exe
            artifacts/PhotoSort-windows-universal.zip
