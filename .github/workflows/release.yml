name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ── macOS arm64 (Apple Silicon) ────────────────────────────────────────────
  build-macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install Pillow customtkinter hachoir pyinstaller
      - name: Build .app
        run: |
          pyinstaller \
            --windowed \
            --name "PhotoSort" \
            --add-data "src/photosort:photosort" \
            --paths src \
            --collect-all customtkinter \
            --collect-all tkinter \
            --hidden-import tkinter \
            --hidden-import _tkinter \
            main.py
      - name: Package DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "PhotoSort" \
            --window-pos 200 120 \
            --window-size 600 380 \
            --icon-size 100 \
            --icon "PhotoSort.app" 175 175 \
            --hide-extension "PhotoSort.app" \
            --app-drop-link 425 175 \
            "PhotoSort-macos-arm64.dmg" \
            "dist/PhotoSort.app"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: PhotoSort-macos-arm64.dmg

  # ── Windows x64 ────────────────────────────────────────────────────────────
  build-windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install Pillow customtkinter hachoir pyinstaller
      - name: Build
        run: |
          pyinstaller `
            --onefile `
            --name PhotoSort `
            --add-data "src/photosort;photosort" `
            --paths src `
            --collect-all customtkinter `
            --collect-all tkinter `
            --hidden-import tkinter `
            --hidden-import _tkinter `
            --noconsole `
            main.py
          mv dist\PhotoSort.exe dist\PhotoSort-windows-x64.exe
      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: dist\PhotoSort-windows-x64.exe

  # ── Windows arm64 ──────────────────────────────────────────────────────────
  build-windows-arm64:
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install Pillow customtkinter hachoir pyinstaller
      - name: Build
        run: |
          pyinstaller `
            --onefile `
            --name PhotoSort `
            --add-data "src/photosort;photosort" `
            --paths src `
            --collect-all customtkinter `
            --collect-all tkinter `
            --hidden-import tkinter `
            --hidden-import _tkinter `
            --noconsole `
            main.py
          mv dist\PhotoSort.exe dist\PhotoSort-windows-arm64.exe
      - uses: actions/upload-artifact@v4
        with:
          name: windows-arm64
          path: dist\PhotoSort-windows-arm64.exe

  # ── Windows Universal (zip of x64 + arm64) ────────────────────────────────
  build-windows-universal:
    needs: [build-windows-x64, build-windows-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-x64
          path: win/
      - uses: actions/download-artifact@v4
        with:
          name: windows-arm64
          path: win/
      - name: Package zip
        run: |
          cd win
          zip ../PhotoSort-windows-universal.zip \
            PhotoSort-windows-x64.exe \
            PhotoSort-windows-arm64.exe
      - uses: actions/upload-artifact@v4
        with:
          name: windows-universal
          path: PhotoSort-windows-universal.zip

  # ── GitHub Release ─────────────────────────────────────────────────────────
  release:
    needs:
      - build-macos-arm64
      - build-windows-x64
      - build-windows-arm64
      - build-windows-universal
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: macos-arm64
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: windows-x64
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: windows-arm64
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: windows-universal
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/PhotoSort-macos-arm64.dmg
            artifacts/PhotoSort-windows-x64.exe
            artifacts/PhotoSort-windows-arm64.exe
            artifacts/PhotoSort-windows-universal.zip
